# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ONLY — DO NOT USE IN PRODUCTION.
# This file ships hardcoded `JWT_SECRET` and Postgres credentials so `npm start`
# works out of the box. A self-hoster running this in prod would publish a
# universally-known JWT signing key (full auth bypass). For production use
# docker-compose.prod.yml, which sources every secret from the environment.
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:
  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://ospos:ospos@postgres:5432/ospos
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ospos
      POSTGRES_PASSWORD: ospos
      POSTGRES_DB: ospos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ospos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
