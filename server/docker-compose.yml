version: '3.8'

services:
  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://ospos:ospos@postgres:5432/ospos
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ospos
      POSTGRES_PASSWORD: ospos
      POSTGRES_DB: ospos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ospos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
