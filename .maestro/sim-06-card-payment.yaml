appId: com.ospos.app
name: "Sim 6 — Card payment (simulated reader)"
tags:
  - simulation
---
- launchApp
- extendedWaitUntil:
    visible:
      text: "Order"
    timeout: 30000
- tapOn: "Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 10000
- takeScreenshot: "sim06-order-screen-paid-tier"

# Order a Coffee
- tapOn: "Coffee"

# Charge
- tapOn:
    text: "Charge.*"
- extendedWaitUntil:
    visible:
      text: "No Tip"
    timeout: 8000
- tapOn: "No Tip"
- takeScreenshot: "sim06-payment-screen-card-enabled"

# Tap Card button (should be enabled now)
- tapOn:
    text: "Card"
    index: 0
- takeScreenshot: "sim06-card-processing"

# Wait for simulated reader to connect and process
- extendedWaitUntil:
    visible:
      text: "Payment Complete"
    timeout: 60000
- takeScreenshot: "sim06-card-receipt"

# New order
- tapOn: "New Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 5000
- takeScreenshot: "sim06-done"
