appId: com.ospos.app
name: "Sim 4 — Back-to-back rapid sales"
tags:
  - simulation
---
- launchApp
- extendedWaitUntil:
    visible:
      text: "Order"
    timeout: 30000
- tapOn: "Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 10000

# === Sale A: Coffee $4.50 ===
- tapOn: "Coffee"
- tapOn:
    text: "Charge.*"
- extendedWaitUntil:
    visible:
      text: "No Tip"
    timeout: 8000
- tapOn: "No Tip"
- tapOn:
    text: "Cash"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Exact Cash"
    timeout: 5000
- tapOn: "Exact Cash"
- extendedWaitUntil:
    visible:
      text: "Payment Complete"
    timeout: 10000
- takeScreenshot: "sim04-sale-a-receipt"
- tapOn: "New Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 5000

# === Sale B: Tacos $8.00 ===
- tapOn: "Tacos"
- tapOn:
    text: "Charge.*"
- extendedWaitUntil:
    visible:
      text: "No Tip"
    timeout: 8000
- tapOn: "No Tip"
- tapOn:
    text: "Cash"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Exact Cash"
    timeout: 5000
- tapOn: "Exact Cash"
- extendedWaitUntil:
    visible:
      text: "Payment Complete"
    timeout: 10000
- takeScreenshot: "sim04-sale-b-receipt"
- tapOn: "New Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 5000

# === Sale C: Coffee + Tacos $12.50 ===
- tapOn: "Coffee"
- tapOn: "Tacos"
- tapOn:
    text: "Charge.*"
- extendedWaitUntil:
    visible:
      text: "No Tip"
    timeout: 8000
- tapOn: "No Tip"
- tapOn:
    text: "Cash"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Exact Cash"
    timeout: 5000
- tapOn: "Exact Cash"
- extendedWaitUntil:
    visible:
      text: "Payment Complete"
    timeout: 10000
- takeScreenshot: "sim04-sale-c-receipt"
- tapOn: "New Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 5000
- takeScreenshot: "sim04-done"
