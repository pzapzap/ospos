appId: com.ospos.app
name: "Sim 5 — Check Summary tab after multiple sales"
tags:
  - simulation
---
- launchApp
- extendedWaitUntil:
    visible:
      text: "Order"
    timeout: 30000

# Navigate to Summary tab
- tapOn: "Summary"
- extendedWaitUntil:
    visible:
      text: "Today"
    timeout: 10000
- takeScreenshot: "sim05-summary-today"

# Navigate to Settings tab
- tapOn: "Settings"
- extendedWaitUntil:
    visible:
      text: "Settings"
    timeout: 5000
- takeScreenshot: "sim05-settings"

# Back to Order tab
- tapOn: "Order"
- extendedWaitUntil:
    visible:
      text: "Coffee"
    timeout: 5000
- takeScreenshot: "sim05-back-to-order"
